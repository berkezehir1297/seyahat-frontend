<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <button (click)="anaSayfayaGit()" class="btn btn-outline-dark rounded-pill px-4 shadow-sm border-2">
        <i class="bi bi-arrow-left-circle-fill me-2"></i>Ana Sayfaya Dön
      </button>
    </div>
  </div>
</div>

<div class="container mt-4 pb-5">
  <div class="text-center mb-5">
    <h2 class="fw-bold text-uppercase" style="letter-spacing: 2px;">🔥 Haftanın Trend Rotaları</h2>
    <p class="text-muted">Senin için seçtiğimiz en popüler tatil noktaları.</p>
  </div>
  
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let otel of trendHotels">
      <div class="card h-100 border-0 shadow-lg overflow-hidden hover-card" style="border-radius: 20px;">
        
        <div class="position-relative">
          <img [src]="otel.resim" class="card-img-top" [alt]="otel.ad" style="height: 250px; object-fit: cover;">
          <div class="position-absolute top-0 end-0 m-3">
            <span class="badge bg-warning text-dark shadow-sm px-3">Trend</span>
          </div>
        </div>
        
        <div class="card-body d-flex flex-column p-4">
          <h5 class="card-title fw-bold">{{ otel.ad }}</h5>
          <p class="text-primary small mb-3">
            <i class="bi bi-geo-alt-fill me-1"></i>{{ otel.konum }}
          </p>
          
          <p class="card-text text-muted small flex-grow-1">
            {{ otel.aciklama | slice:0:120 }}...
          </p>
          
          <hr class="my-3 opacity-25">
          
          <div class="text-success fw-bold fs-4 mb-3">
            {{ otel.fiyat }} <span class="small">TL</span>
          </div>

          <div class="d-grid gap-2">
            <button (click)="rezervasyonYap(otel.konum)" class="btn btn-warning text-white fw-bold rounded-pill shadow-sm">
              <i class="bi bi- lightning-charge-fill"></i> Hemen Rezervasyon Yap
            </button>
            <a [routerLink]="['/hotel-detail', otel.id]" class="btn btn-outline-primary rounded-pill fw-bold">
              Detayları İncele
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
