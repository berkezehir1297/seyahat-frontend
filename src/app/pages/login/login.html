<div class="login-container d-flex align-items-center justify-content-center">
  <div class="login-card p-5 shadow-lg text-center">
    <div class="mb-4">
      <i class="bi bi-person-badge fs-1 text-primary"></i>
      <h2 class="fw-bold mt-2">Tekrar Hoş Geldin!</h2>
      <p class="text-muted">Macera kaldığı yerden devam ediyor.</p>
    </div>

    <form (ngSubmit)="onLogin()">
      
      <div class="mb-3 text-start">
        <label class="form-label">E-posta</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" class="form-control custom-input" placeholder="E-postanızı girin" required>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">Şifre</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" class="form-control custom-input" placeholder="******" required>
      </div>

      <div class="d-flex justify-content-between mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label shadow-sm" for="remember">Beni Hatırla</label>
        </div>
        <!-- DÜZELTİLEN YER: href yerine routerLink eklendi -->
        <a routerLink="/forgot-password" class="text-decoration-none" style="cursor: pointer;">Şifremi Unuttum</a>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 shadow">Giriş Yap</button>
      
      <div class="mt-4">
        <span>Henüz hesabın yok mu? <a routerLink="/register" class="text-decoration-none">Kayıt Ol</a></span>
      </div>
    </form>
  </div>
</div>
