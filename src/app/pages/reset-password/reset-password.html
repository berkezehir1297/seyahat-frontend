<div class="reset-container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card p-4 shadow-sm" style="width: 400px;">
    <h3 class="text-center mb-4">Yeni Şifre Belirle</h3>
    
    <div class="mb-3">
      <label class="form-label">Yeni Şifre</label>
      <input type="password" [(ngModel)]="newPassword" class="form-control" placeholder="******">
    </div>

    <div class="mb-3">
      <label class="form-label">Şifre Tekrar</label>
      <input type="password" [(ngModel)]="confirmPassword" class="form-control" placeholder="******">
    </div>

    <button class="btn btn-primary w-100" (click)="sifreGuncelle()">Şifreyi Güncelle</button>
  </div>
</div>
