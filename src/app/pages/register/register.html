<div class="register-container d-flex align-items-center justify-content-center">
  <div class="register-card p-5 shadow-lg">
    <div class="text-center mb-4">
      <i class="bi bi-airplane-engines fs-1 text-primary"></i>
      <h2 class="fw-bold mt-2">Yola Çıkmaya Hazır mısın?</h2>
      <p class="text-muted">Hayalindeki rotayı oluşturmak için hemen kayıt ol.</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label">Ad Soyad</label>
        <input type="text" name="name" [(ngModel)]="registerData.name" class="form-control custom-input" placeholder="Adınız Soyadınız" required>
      </div>

      <div class="mb-3">
        <label class="form-label">E-posta</label>
        <input type="email" name="email" [(ngModel)]="registerData.email" class="form-control custom-input" placeholder="orn@mail.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" name="password" [(ngModel)]="registerData.password" class="form-control custom-input" placeholder="******" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 mt-3 shadow">Hesap Oluştur</button>
      
      <div class="text-center mt-4">
        <span>Zaten üye misin? <a href="#" class="text-decoration-none">Giriş Yap</a></span>
      </div> 
    </form>
  </div>
</div>
