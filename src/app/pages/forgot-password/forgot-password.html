<p>forgot-password works!</p>
<div class="forgot-password-wrapper">
  <div class="forgot-card shadow">
    <div class="icon-header">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h3>Şifreni mi Unuttun?</h3>
    <p>Kayıtlı e-posta adresini yaz, sana bir sıfırlama linki gönderelim.</p>

    <div class="form-group">
      <label>E-posta Adresi</label>
      <input type="email" [(ngModel)]="email" class="form-control" placeholder="ornek@mail.com">
    </div>

    <button class="btn btn-primary w-100" (click)="baglantiGonder()">Link Gönder</button>

    <div class="mt-3">
      <a routerLink="/login" class="text-decoration-none">Geri Dön</a>
    </div>
  </div>
</div>
